    // Function to check if string contains only letters
    function isOnlyLetters(str) {
        for (let i = 0; i < str.length; i++) {
            const code = str.charCodeAt(i);
            if (!((code >= 65 && code <= 90) || (code >= 97 && code <= 122))) {
                return false;
            }
        }
        return true;
    }

    // Real-time validation for username
    usernameInput.addEventListener("input", function() {
        const value = this.value;
        
        if (value === "") {
            this.setCustomValidity("");
            usernameError.style.display = "none";
            return;
        }
        
        if (!isOnlyLetters(value)) {
            usernameError.textContent = "Username can only contain letters (A-Z, a-z)";
            usernameError.style.display = "block";
            this.setCustomValidity("Username can only contain letters");
            this.reportValidity();
        } else if (value.length < 5) {
            usernameError.textContent = "Username must be at least 5 characters";
            usernameError.style.display = "block";
            this.setCustomValidity("Username must be at least 5 characters");
            this.reportValidity();
        } else if (value.length > 25) {
            usernameError.textContent = "Username must not exceed 25 characters";
            usernameError.style.display = "block";
            this.setCustomValidity("Username must not exceed 25 characters");
            this.reportValidity();
        } else {
            usernameError.style.display = "none";
            this.setCustomValidity("");
        }
    });

    // Real-time validation for password
    passwordInput.addEventListener("input", function() {
        const value = this.value;
        
        if (value === "") {
            this.setCustomValidity("");
            passwordError.style.display = "none";
            return;
        }
        
        if (value.length < 6) {
            passwordError.textContent = "Password must be at least 6 characters";
            passwordError.style.display = "block";
            this.setCustomValidity("Password must be at least 6 characters");
            this.reportValidity();
        } else {
            passwordError.style.display = "none";
            this.setCustomValidity("");
        }
    });

    // Form submission - Staff authentication with role
    form.addEventListener("submit", function(e) {
        e.preventDefault();
        
        if (!form.checkValidity()) {
            alert("Please fix the errors before submitting");
            return;
        }
        
        const username = usernameInput.value.toLowerCase();
        const password = passwordInput.value;
        const selectedRole = roleSelect.value;
        
        // Find matching staff
        const staff = staffCredentials.find(s => s.username === username && s.password === password);
        
        if (staff) {
            // Map selected role value to full role name
            let roleMapping = {
                "admin": "CEO",
                "manager": "Shop Manager",
                "cashier": "Administrator",
                "stock": "Stock Manager",
                "driver": "Delivery Driver",
                "auditor": "Auditor",
                "accountant": "Accountant",
                "coordinator": "Delivery Coordinator"
            };
            
            const expectedRole = roleMapping[selectedRole] || selectedRole;
            
            // Check if selected role matches stored role
            if (staff.role === expectedRole) {
                // Store login info in sessionStorage
                sessionStorage.setItem("isLoggedIn", "true");
                sessionStorage.setItem("userRole", staff.role);
                sessionStorage.setItem("userName", staff.name);
                sessionStorage.setItem("username", staff.username);
                sessionStorage.setItem("userEmail", staff.email);
                sessionStorage.setItem("userPhone", staff.phone);
                
                alert(`Welcome ${staff.name}! Redirecting to staff page...`);
                window.location.href = "staff.html";
            } else {
                alert(`Invalid role selection. ${staff.name} is a ${staff.role}. Please select the correct role.`);
                usernameInput.value = "";
                passwordInput.value = "";
                usernameInput.focus();
            }
        } else {
            alert("Invalid credentials. Staff access only.");
            usernameInput.value = "";
            passwordInput.value = "";
            usernameInput.focus();
        }
    });
